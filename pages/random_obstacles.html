<!DOCTYPE html>
<html>
<head>
    <title>Babylon.js - Stable LineSystem (Ambient Only)</title>
    <script src="https://cdn.babylonjs.com/babylon.js?v=20260403"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { width: 100%; height: 100%; outline: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.8); padding: 10px; font-family: monospace; pointer-events: none; border: 1px solid #777; }
    </style>
</head>
<body>
    <div id="ui">
        <b>COMMANDS:</b> WASD / QE<br>
        <div id="dist">Distances: ---</div>
    </div>
    <canvas id="renderCanvas"></canvas>

    <script>
      // TODO 車の形、色
      // TODO 障害物の形、色
      // TODO 車と障害物の衝突検知
      // TODO 衝突を検知したら移動を前に戻す
      // TODO subscribe
      // TODO publish = state(???)
      // mazeをこちらと同じにしてみる
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);

            // --- 1. 環境光設定 (ライトなし) ---
            scene.ambientColor = new BABYLON.Color3(1, 1, 1);
            scene.clearColor = new BABYLON.Color4(0.05, 0.05, 0.05, 1);

            // --- 2. 直交投影カメラ ---
            const camera = new BABYLON.FreeCamera("camera1", new BABYLON.Vector3(0, 50, 0), scene);
            camera.setTarget(BABYLON.Vector3.Zero());
            camera.mode = BABYLON.Camera.ORTHOGRAPHIC_CAMERA;
            const updateOrtho = () => {
                const aspect = engine.getAspectRatio(camera);
                const zoom = 15;
                camera.orthoTop = zoom; camera.orthoBottom = -zoom;
                camera.orthoLeft = -zoom * aspect; camera.orthoRight = zoom * aspect;
            };
            window.addEventListener("resize", updateOrtho);
            updateOrtho();

            // --- 3. マテリアル設定 ---
            const groundMat = new BABYLON.StandardMaterial("gMat", scene);
            groundMat.ambientColor = new BABYLON.Color3(0.2, 0.2, 0.2);

            const carMat = new BABYLON.StandardMaterial("carMat", scene);
            carMat.ambientColor = new BABYLON.Color3(0, 0.5, 1);

            const obsMat = new BABYLON.StandardMaterial("oMat", scene);
            obsMat.ambientColor = new BABYLON.Color3(0.8, 0.2, 0.2);

            // --- 4. メッシュ作成 ---
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 100, height: 100}, scene);
            ground.material = groundMat;

            const car = BABYLON.MeshBuilder.CreateBox("car", { width: 1.2, height: 0.2, depth: 1.8 }, scene);
            car.position.y = 0.1;
            car.material = carMat;

            for (let i = 0; i < 12; i++) {
                const box = BABYLON.MeshBuilder.CreateBox("obs", { size: 2 }, scene);
                box.position.set(Math.random()*30-15, 1, Math.random()*30-15);
                box.material = obsMat;
            }

            // --- 5. LineSystem の初期化 ---
            let rayPoints = [];
            let rayColors = [];
            for (let i = 0; i < 8; i++) {
                rayPoints.push([new BABYLON.Vector3(0,0,0), new BABYLON.Vector3(0,1,0)]);
                rayColors.push([new BABYLON.Color4(0,1,0,1), new BABYLON.Color4(0,1,0,1)]);
            }

            let rayLinesMesh = BABYLON.MeshBuilder.CreateLineSystem("rays", {
                lines: rayPoints,
                colors: rayColors,
                updatable: true
            }, scene);

            // --- 6. 移動ロジックと入力 ---
            const keys = {};
            window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
            window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

            scene.registerBeforeRender(() => {
                const vy = (keys["w"] ? 0.15 : 0) - (keys["s"] ? 0.15 : 0);
                const vx = (keys["d"] ? 0.1 : 0) - (keys["a"] ? 0.1 : 0);
                const vr = (keys["e"] ? 0.05 : 0) - (keys["q"] ? 0.05 : 0);
                car.rotation.y += vr;
                car.translate(BABYLON.Axis.X, vx, BABYLON.Space.LOCAL);
                car.translate(BABYLON.Axis.Z, vy, BABYLON.Space.LOCAL);

                const rayLength = 100;
                const nextLines = [];
                const nextColors = [];
                const dists = [];

                for (let i = 0; i < 8; i++) {
                    const angle = i * (Math.PI / 4) + car.rotation.y;
                    const direction = new BABYLON.Vector3(Math.sin(angle), 0, Math.cos(angle));

                    const rayOrigin = car.position.clone();
                    const lineOrigin = car.position.clone();
                    rayOrigin.y = 1.0; // car より高く/boxより低い
                    lineOrigin.y = 2.1; // boxより高い

                    const ray = new BABYLON.Ray(rayOrigin, direction, rayLength);
                    const hit = scene.pickWithRay(ray, (m) => m.name !== rayLinesMesh);

                    let d = rayLength;
                    let col = new BABYLON.Color4(0, 1, 0, 1); // 緑

                    if (hit.hit) {
                        d = hit.distance;
                        col = new BABYLON.Color4(1, 0, 0, 1); // 赤
                    }
                    dists.push(d.toFixed(1));

                    nextLines.push([lineOrigin, lineOrigin.add(direction.scale(d))]);
                    nextColors.push([col, col]);
                }

                // LineSystem の更新
                rayLinesMesh = BABYLON.MeshBuilder.CreateLineSystem(null, {
                    lines: nextLines,
                    colors: nextColors,
                    instance: rayLinesMesh
                });

                document.getElementById("dist").innerText = "Distances: " + dists.join(" | ");
            });

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => scene.render());
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
