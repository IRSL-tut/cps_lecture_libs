<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>バイブレーションデモ</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100;
      margin: 0;
      background: #f5f5f5;
    }
    button {
      font-size: 1.2rem;
      padding: 1em 2em;
      border: none;
      border-radius: 12px;
      background: #0078d4;
      color: white;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <button id="vibrateBtn">バイブレーション</button>

  <script>
    const button = document.getElementById('vibrateBtn');

    button.addEventListener('click', () => {
      if ('vibrate' in navigator) {
        navigator.vibrate(200);
      } else {
        alert('この端末・ブラウザはバイブレーションに対応していません。');
      }
    });
  </script>
</body>
</html>
